<!doctype html>
<html lang="fr">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>La méthode — MIRROR ME</title></head>
<body>
<script>
(async function(){
  const source = await fetch('index.html', {cache:'no-store'}).then(r => r.text());
  const doc = new DOMParser().parseFromString(source, 'text/html');
  let head = doc.head.innerHTML.replace(/<title>[\s\S]*?<\/title>/i, '<title>La méthode — MIRROR ME</title>');
  const nav = doc.querySelector('nav#nav') ? doc.querySelector('nav#nav').outerHTML : '';
  const footerPre = doc.querySelector('.footer-pre') ? doc.querySelector('.footer-pre').outerHTML : '';
  const footer = doc.querySelector('footer') ? doc.querySelector('footer').outerHTML : '';
  const heroNode = doc.querySelector('.mm-photo-panel');
  let heroPhoto = '';
  if (heroNode) {
    heroNode.classList.remove('reveal','d1','d2','d3','d4');
    heroNode.style.setProperty('display','block','important');
    heroNode.style.setProperty('opacity','1','important');
    heroNode.style.setProperty('visibility','visible','important');
    heroNode.style.setProperty('transform','none','important');
    const heroImg = heroNode.querySelector('img');
    if (heroImg) {
      heroImg.setAttribute('loading','eager');
      heroImg.setAttribute('decoding','sync');
      heroImg.style.setProperty('display','block','important');
      heroImg.style.setProperty('opacity','1','important');
      heroImg.style.setProperty('visibility','visible','important');
      heroImg.style.setProperty('width','100%','important');
      heroImg.style.setProperty('height','auto','important');
    }
    heroPhoto = heroNode.outerHTML;
  }
  const scripts = Array.from(doc.querySelectorAll('script')).map(s => s.outerHTML).join('\n');
  const content = `
<section class="page-hero"><div class="page-hero-bg">MÉTHODE</div><p class="page-eyebrow reveal">BRISE TES CHAÎNES</p><div class="page-bar reveal d1"></div><h1 class="page-title reveal d2">La méthode<br><em>qui remet la décision au bon endroit.</em></h1><p class="page-sub reveal d3">Un cadre pour identifier ce qui se répète, nommer la loyauté qui maintient la répétition, et revenir à une décision qui ne soit plus défaite par l’ancien mécanisme.</p>${heroPhoto}</section>
<section class="section"><div class="grid-2"><div><span class="label reveal">Le point de départ</span><h2 class="t-large reveal d1">La décision, tu l’as déjà prise. Plusieurs fois.</h2></div><div class="body reveal d2"><p>Quelque chose la défait avant que tu passes à l’acte. Et ce quelque chose, tu ne sais pas tout à fait ce que c’est, même si tu sens depuis longtemps qu’il est là.</p><p>Ce n’est pas un manque de volonté. C’est souvent un mécanisme plus ancien, installé dans un système précis — familial, professionnel, amoureux — où tu as appris comment tenir ta place, éviter de menacer un équilibre, rester reconnu, rester acceptable, rester loyal à quelque chose qui comptait pour toi.</p><p>À un moment de ta vie, cette réponse a eu une fonction. Elle t’a aidé à tenir. Le problème commence quand elle continue de lire les situations avant toi, dans des contextes qui n’ont plus rien à voir avec ce qui l’a produite.</p></div></div></section>
<section class="section section-pale"><span class="label reveal">Ce que la méthode regarde</span><h2 class="t-large reveal d1">Le prix relationnel de la décision.</h2><p class="body-sm reveal d2" style="max-width:760px;margin-top:24px;color:rgba(26,24,22,.62)">Beaucoup de personnes savent déjà quoi faire. Ce qui bloque, c’est ce que la décision viendrait toucher : une loyauté ancienne, une place tenue trop longtemps, une peur de décevoir, une image à maintenir, un lien qu’on croit devoir protéger.</p><div class="cards-grid reveal d3" style="margin-top:52px"><div class="card"><p class="card-num">01</p><h3 class="card-title">Ce qui se répète</h3><p class="card-body">La position intérieure qui revient, même quand les personnes, les décors ou les circonstances changent.</p></div><div class="card"><p class="card-num">02</p><h3 class="card-title">Ce que ça protège</h3><p class="card-body">La loyauté, le rôle ou l’équilibre que tu continues peut-être à préserver sans l’avoir décidé consciemment.</p></div><div class="card"><p class="card-num">03</p><h3 class="card-title">Ce que ça coûte</h3><p class="card-body">La part de toi qui reste coincée dans une forme de vie, de lien ou de décision qui ne te correspond plus.</p></div></div></section>
<section class="section section-dark"><div class="grid-2"><div><span class="label label-light reveal">Comment se passe une séance</span><h2 class="t-large reveal d1" style="color:var(--cream)">Un sujet. Un seul. Puis le point que tu contournes.</h2><p class="body-sm reveal d2 dark-soft" style="margin-top:28px">Travailler sur tout est souvent une façon élégante de ne rien toucher. La séance verrouille un sujet, puis descend au niveau où le mécanisme se décide.</p></div><div class="steps reveal d2"><div class="step" style="border-color:rgba(247,245,240,.12)"><div class="step-num">01</div><div><h3 class="step-title">Nommer</h3><p class="step-body dark-soft">Ce que tu crois amener, le sujet en surface, la situation qui prend de la place.</p></div></div><div class="step" style="border-color:rgba(247,245,240,.12)"><div class="step-num">02</div><div><h3 class="step-title">Descendre</h3><p class="step-body dark-soft">Ce qui se répète, la loyauté active, le coût de rester dans cette position, la vérité utile.</p></div></div><div class="step" style="border-color:rgba(247,245,240,.12)"><div class="step-num">03</div><div><h3 class="step-title">Agir</h3><p class="step-body dark-soft">Tu repars avec le prochain geste. Pas le grand projet. Le geste d’après.</p></div></div></div></div></section>
<section class="section"><div class="grid-2"><div><span class="label reveal">Entre les séances</span><h2 class="t-large reveal d1">Le travail continue dans la vraie vie.</h2></div><div class="body reveal d2"><p>Tu n’as pas à ressentir quelque chose de particulier. Tu observes le moment exact où l’ancien schéma reprend la main, ce qu’il t’a fait dire ou taire, ce que tu as fait dans les minutes qui ont suivi.</p><p>Selon le travail engagé, les outils peuvent prendre la forme d’un journal de loyauté, d’une cartographie du schéma, d’un exercice ciblé, d’une phrase d’ancrage personnelle, d’une action de rupture minimale, d’une conversation préparée ou d’une synthèse écrite.</p><p>Un outil par objectif. Pas tout. Ce qui sert ton changement maintenant.</p></div></div></section>
<section class="section section-pale"><span class="label reveal">Les formats</span><h2 class="t-large reveal d1">Trois portes, trois niveaux de travail.</h2><div class="cards-grid reveal d2" style="margin-top:52px"><div class="card"><p class="card-num">Diagnostic relationnel</p><h3 class="card-title">Révéler</h3><p class="card-body">75 minutes pour nommer ce qui se joue vraiment, identifier la chaîne à briser en premier, puis repartir avec une synthèse sous 24h.</p></div><div class="card"><p class="card-num">Cycle Brise-Chaîne</p><h3 class="card-title">Transformer</h3><p class="card-body">Six semaines pour travailler un schéma précis, observer sa réactivation et poser des actions concrètes.</p></div><div class="card"><p class="card-num">Accompagnement Identité</p><h3 class="card-title">Stabiliser</h3><p class="card-body">Trois mois pour travailler une loyauté plus profonde et installer une nouvelle position intérieure.</p></div></div></section>
<section class="closing"><h2 class="closing-title reveal">Tu sais peut-être quoi faire.<span>Ce qui bloque, c’est le prix relationnel de la décision.</span></h2><div class="reveal d2" style="display:flex;gap:18px;justify-content:center;flex-wrap:wrap"><a class="btn btn-dark" href="https://tally.so/r/RGZOQj" rel="noopener" target="_blank">Remplir le questionnaire →</a><a class="btn btn-ghost" href="coaching.html">Voir les accompagnements →</a></div></section>`;
  const body = '<div class="cursor" id="cursor"></div><div aria-hidden="true" class="ambient-motion"></div>' + nav + content + footerPre + footer + scripts;
  document.open();
  document.write('<!doctype html><html lang="fr"><head>' + head + '</head><body>' + body + '</body></html>');
  document.close();
})();
</script>
</body>
</html>
