<!doctype html>
<html lang="fr">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Coaching — MIRROR ME</title></head>
<body>
<script>
(async function(){
  const source = await fetch('index.html', {cache:'no-store'}).then(r => r.text());
  const doc = new DOMParser().parseFromString(source, 'text/html');
  const head = doc.head.innerHTML.replace(/<title>[\s\S]*?<\/title>/i, '<title>Coaching — MIRROR ME</title>');
  const nav = doc.querySelector('nav#nav') ? doc.querySelector('nav#nav').outerHTML : '';
  const mikaSection = doc.querySelector('.mm-mika-section') ? doc.querySelector('.mm-mika-section').outerHTML : '';
  const footerPre = doc.querySelector('.footer-pre') ? doc.querySelector('.footer-pre').outerHTML : '';
  const footer = doc.querySelector('footer') ? doc.querySelector('footer').outerHTML : '';
  const heroVisualNode = doc.querySelector('.mm-photo-panel');
  let heroVisual = '';
  if (heroVisualNode) {
    heroVisualNode.classList.remove('reveal','d1','d2','d3','d4');
    heroVisualNode.style.setProperty('display','block','important');
    heroVisualNode.style.setProperty('opacity','1','important');
    heroVisualNode.style.setProperty('visibility','visible','important');
    heroVisualNode.style.setProperty('transform','none','important');
    heroVisual = heroVisualNode.outerHTML;
  }
  const visualStrip = doc.querySelector('.mm-home-strip') ? doc.querySelector('.mm-home-strip').outerHTML : '';
  const scripts = Array.from(doc.querySelectorAll('script')).map(s => s.outerHTML).join('\n');
  const content = `
<section class="page-hero"><div class="page-hero-bg">COACHING</div><p class="page-eyebrow reveal">INTELLIGENCE RELATIONNELLE</p><div class="page-bar reveal d1"></div><h1 class="page-title reveal d2">Quand tu restes coincé<br><em>entre ce que tu veux et ce que tu crois devoir aux autres.</em></h1><p class="page-sub reveal d3">J’accompagne des adultes qui répètent les mêmes situations dans leurs relations, leur famille, leur travail ou leurs décisions. On regarde ce que tu continues à préserver pour ne pas décevoir, perdre ta place ou menacer un équilibre ancien. Puis on remet ta décision au centre.</p><div class="hero-ctas reveal d3"><a class="btn btn-yellow" href="https://tally.so/r/RGZOQj" rel="noopener" target="_blank">Remplir le questionnaire →</a><a class="btn btn-light" href="https://cal.eu/michael-moyal-jdunzg" rel="noopener" target="_blank">Réserver →</a></div><span class="mika-signature hero-signature">Mika</span>${heroVisual}</section>
<section class="section"><div class="grid-2"><div><span class="label reveal">Ce que l’on travaille</span><h2 class="t-large reveal d1">L’endroit où tu fais passer le lien, l’image ou la sécurité avant ta propre direction.</h2></div><div class="body reveal d2"><p>Ce travail part d’une chose très concrète : une attente familiale, une place à tenir, une peur de décevoir, une image à maintenir, une sécurité à ne pas perdre, une relation qu’on pense devoir protéger à tout prix.</p><p>Tu peux savoir ce que tu veux et rester immobile parce que ta décision aurait un coût relationnel. On nomme ce coût, on regarde le rôle que tu continues à jouer, puis on identifie le prochain geste qui te remet dans une position adulte.</p></div></div>${visualStrip}</section>
<section class="section section-pale"><span class="label reveal">Les trois formats</span><h2 class="t-large reveal d1">Des paliers, pas un menu confus.</h2><p class="body-sm reveal d2" style="max-width:760px;margin-top:24px;color:rgba(26,24,22,.62)">Le diagnostic révèle. Le cycle travaille un schéma précis. L’accompagnement identité stabilise une nouvelle position intérieure.</p><div class="cards-grid reveal d3" style="margin-top:52px"><div class="card"><p class="card-num">01 · 75 min · 180 €</p><h3 class="card-title">Diagnostic Relationnel</h3><p class="card-body">Une séance pour clarifier une situation, identifier le schéma principal et repartir avec une lecture structurée. Questionnaire en amont et synthèse écrite sous 24h.</p><a class="offer-link" href="https://tally.so/r/RGZOQj" rel="noopener" target="_blank">Demander un diagnostic →</a></div><div class="card"><p class="card-num">02 · 6 semaines · 1 080 €</p><h3 class="card-title">Cycle Brise-Chaîne</h3><p class="card-body">Six séances pour travailler un schéma identifié, cartographier son mécanisme, utiliser des exercices ciblés et garder un support message cadré entre les séances.</p><a class="offer-link" href="https://tally.so/r/RGZOQj" rel="noopener" target="_blank">Présenter ma demande →</a></div><div class="card"><p class="card-num">03 · 12 semaines · 2 400 €</p><h3 class="card-title">Accompagnement Identité</h3><p class="card-body">Douze séances pour travailler une place, une peur ou un rôle devenu trop lourd, avec audit relationnel, bilan intermédiaire, synthèse finale longue et consolidation à six mois.</p><a class="offer-link" href="https://tally.so/r/RGZOQj" rel="noopener" target="_blank">Entrer dans le cadre →</a></div></div></section>
<section class="section section-dark"><div class="grid-2"><div><span class="label label-light reveal">Le parcours client</span><h2 class="t-large reveal d1">Le cadre commence avant la séance.</h2><p class="body-sm reveal d2 dark-soft" style="margin-top:28px">Le questionnaire n’est pas une formalité. Il filtre, clarifie et donne déjà une première matière de travail.</p></div><div class="steps reveal d2"><div class="step"><div class="step-num">01</div><div><h3 class="step-title">Questionnaire</h3><p class="step-body dark-soft">Tu poses la situation, ce qui se répète, ce que tu sais déjà et ce que tu n’arrives plus à changer.</p></div></div><div class="step"><div class="step-num">02</div><div><h3 class="step-title">Validation</h3><p class="step-body dark-soft">Je lis ta demande et je vérifie si le cadre est juste. Certaines demandes doivent être réorientées.</p></div></div><div class="step"><div class="step-num">03</div><div><h3 class="step-title">Paiement et créneau</h3><p class="step-body dark-soft">Le créneau est confirmé après validation du point d’entrée et règlement de la séance ou du parcours.</p></div></div><div class="step"><div class="step-num">04</div><div><h3 class="step-title">Séance et suite</h3><p class="step-body dark-soft">On travaille un sujet précis. Tu repars avec une lecture claire, une action et une synthèse selon le format choisi.</p></div></div></div></div></section>
<section class="section"><div class="grid-2"><div><span class="label reveal">Demandes adaptées</span><h2 class="t-large reveal d1">Quand tu sens que quelque chose se répète, mais que tu n’arrives plus à voir quoi changer.</h2></div><div class="body reveal d2"><p>Les demandes adaptées concernent les répétitions relationnelles, familiales ou professionnelles, les décisions que tu repousses, les attentes qui pèsent encore sur toi, les rôles que tu continues à jouer, les transitions d’identité et le besoin de te repositionner clairement.</p><p>Le cadre convient aussi quand tu pressens déjà une décision, mais que tes peurs, tes attachements ou ton besoin de rester acceptable brouillent encore la lecture.</p></div></div></section>
<section class="section section-pale"><div class="grid-2"><div><span class="label reveal">Limites du cadre</span><h2 class="t-large reveal d1">Ce travail n’est pas une thérapie et ne remplace pas un accompagnement médical.</h2></div><div class="body reveal d2"><p>Le coaching proposé s’adresse à des personnes en capacité d’autonomie psychique qui souhaitent clarifier une situation, identifier des schémas et avancer vers une action concrète.</p><p>Les situations de danger immédiat, crise suicidaire, violence active, urgence psychologique, trouble psychiatrique aigu ou demande thérapeutique lourde doivent être orientées vers des professionnels compétents.</p><p>Je refuse aussi les demandes qui cherchent une validation affective, une décision prise à ta place, ou un contournement du cadre, du paiement, du questionnaire ou de la responsabilité du travail.</p></div></div></section>
<section class="section"><div class="grid-2c"><div><span class="label reveal">Entre les séances</span><h2 class="t-large reveal d1">Un support cadré, pas une disponibilité émotionnelle en continu.</h2><p class="body-sm reveal d2" style="margin-top:28px;color:rgba(26,24,22,.62)">Le canal entre séances sert uniquement au travail en cours : prise de conscience, action définie, question de clarification. Pas de coaching complet par message. Pas de gestion d’urgence.</p></div><div class="tool-card reveal d3"><span class="label label-light">Entrée prioritaire</span><h3 class="t-large" style="color:var(--cream)">Commencer par le questionnaire.</h3><p class="body-sm dark-soft" style="margin-top:22px">Tu réponds avec précision. Je lis. Si le cadre est juste, on valide le bon point d’entrée : Diagnostic, Cycle ou Accompagnement Identité.</p><a class="btn btn-yellow" href="https://tally.so/r/RGZOQj" rel="noopener" target="_blank" style="margin-top:34px">Remplir le questionnaire →</a></div></div></section>
<section class="closing"><h2 class="closing-title reveal">Ce qui te bloque a souvent une logique.<span>On va arrêter de la laisser décider à ta place.</span></h2><div class="reveal d2" style="display:flex;gap:18px;justify-content:center;flex-wrap:wrap"><a class="btn btn-dark" href="https://tally.so/r/RGZOQj" rel="noopener" target="_blank">Remplir le questionnaire →</a><a class="btn btn-ghost" href="index.html">Retour à l’accueil →</a></div></section>`;
  const body = '<div class="cursor" id="cursor"></div><div aria-hidden="true" class="ambient-motion"></div>' + nav + content + mikaSection + footerPre + footer + scripts;
  document.open();
  document.write('<!doctype html><html lang="fr"><head>' + head + '</head><body class="coaching-page">' + body + '</body></html>');
  document.close();
})();
</script>
</body>
</html>
