name: Clean formats page
on:
  push:
    paths:
      - '*.html'
      - '.github/workflows/clean-formats.yml'
      - '.github/workflows/trigger-clean-formats.txt'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Repair formats page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git revert --no-edit 07d3b05d641ffce1d173c25113e548adfd2069bd || true
          python3 - <<'PY'
          from pathlib import Path
          p = Path('formats.html')
          s = p.read_text(encoding='utf-8')
          s = s.replace('&lt;!-- formats_FINAL_clean · consolidated from V15, no patch stacking --&gt;', '')
          s = s.replace('<!-- formats_FINAL_clean · consolidated from V15, no patch stacking -->', '')
          start = s.find('<div class="mm-method-photo reveal d2">')
          if start != -1:
              end = s.find('</div>', start)
              if end != -1:
                  s = s[:start] + s[end+6:]
          p.write_text(s, encoding='utf-8')
          PY
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Repair formats photos
