name: Clean formats page
on:
  push:
    paths:
      - '*.html'
      - '.github/workflows/clean-formats.yml'
      - '.github/workflows/trigger-clean-formats.txt'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clean formats file and add Formats nav link
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def add_once_after(s, needle, addition):
              pos = 0
              while True:
                  i = s.find(needle, pos)
                  if i == -1:
                      return s
                  after = i + len(needle)
                  window = s[after:after + 220]
                  if 'href="formats.html"' not in window and "href='formats.html'" not in window:
                      return s[:after] + addition + s[after:]
                  pos = after

          html_files = [p for p in Path('.').glob('*.html') if p.is_file()]

          for p in html_files:
              s = p.read_text(encoding='utf-8')
              original = s

              # Remove internal comment if it is visible or raw
              s = s.replace('&lt;!-- formats_FINAL_clean · consolidated from V15, no patch stacking --&gt;', '')
              s = s.replace('<!-- formats_FINAL_clean · consolidated from V15, no patch stacking -->', '')

              # Remove the hero photo only on formats.html
              if p.name == 'formats.html':
                  start = s.find('<div class="mm-photo-panel reveal d3">')
                  if start != -1:
                      end = s.find('</div>', start)
                      if end != -1:
                          s = s[:start] + s[end+6:]

              # Desktop nav: add Formats immediately after Coaching
              s = add_once_after(
                  s,
                  '<li><a href="coaching.html">Coaching</a></li>',
                  '\n<li><a href="formats.html">Formats</a></li>'
              )
              s = add_once_after(
                  s,
                  '<li><a class="active" href="coaching.html">Coaching</a></li>',
                  '\n<li><a href="formats.html">Formats</a></li>'
              )

              # Mobile menu: add Formats immediately after Coaching
              s = add_once_after(
                  s,
                  '\n<a href="coaching.html">Coaching</a>',
                  '\n<a href="formats.html">Formats</a>'
              )
              s = add_once_after(
                  s,
                  '\n<a class="active" href="coaching.html">Coaching</a>',
                  '\n<a href="formats.html">Formats</a>'
              )

              if s != original:
                  p.write_text(s, encoding='utf-8')
          PY
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Add formats navigation link after coaching
