name: Clean formats page
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clean file
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('formats.html')
          s = p.read_text(encoding='utf-8')
          s = s.replace('&lt;!-- formats_FINAL_clean · consolidated from V15, no patch stacking --&gt;', '')
          start = s.find('<div class="mm-photo-panel reveal d3">')
          if start != -1:
              end = s.find('</div>', start)
              if end != -1:
                  s = s[:start] + s[end+6:]
          p.write_text(s, encoding='utf-8')
          PY
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Remove hero photo from formats page
