name: Run editorial graft script

on:
  push:
    branches:
      - safe-css-migration
    paths:
      - 'trigger-editorial-graft.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: safe-css-migration
          fetch-depth: 0
      - name: Run editorial graft
        run: python3 scripts/apply_editorial_graft.py
      - name: Commit editorial graft
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html vision.html territoires.html coaching.html EDITORIAL_GRAFT_APPLIED.md || true
          if ! git diff --cached --quiet; then
            git commit -m "Apply editorial graft"
            git push origin safe-css-migration
          else
            echo "No changes to commit."
          fi
