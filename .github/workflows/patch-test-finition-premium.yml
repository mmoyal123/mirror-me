name: Patch test finition premium

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/patch-test-finition-premium.yml'
      - 'clarte-section.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-test-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: test-finition-premium
      - name: Inject clarity section
        run: |
          python3 - <<'PY'
          from pathlib import Path
          block = Path('clarte-section.html').read_text(encoding='utf-8').strip() + '\n'
          index = Path('index.html')
          html = index.read_text(encoding='utf-8')
          if 'id="clarte"' not in html:
              marker = '<section class="section" id="ressources">'
              pos = html.find(marker)
              if pos < 0:
                  marker = '<section class="section section-dark" id="guide">'
                  pos = html.find(marker)
              if pos < 0:
                  raise SystemExit('target marker not found')
              html = html[:pos] + block + html[pos:]
              index.write_text(html, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name ChatGPT
          git config user.email chatgpt-actions@users.noreply.github.com
          git add index.html
          git diff --cached --quiet || (git commit -m "Inject clarity section into test homepage" && git push origin test-finition-premium)
