name: Decode carousel image assets

on:
  push:
    branches: [main]
    paths:
      - 'tmp/covers/READY'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode uploaded carousel covers
        run: |
          mkdir -p assets
          cat $(ls tmp/covers/overthinking.part-* | sort) | rev > /tmp/overthinking.b64
          cat $(ls tmp/covers/amour-condition.part-* | sort) | rev > /tmp/amour-condition.b64
          cat $(ls tmp/covers/tout-commence.part-* | sort) | rev > /tmp/tout-commence.b64
          base64 -d /tmp/overthinking.b64 > assets/carousel-overthinking.png
          base64 -d /tmp/amour-condition.b64 > assets/carousel-amour-condition.png
          base64 -d /tmp/tout-commence.b64 > assets/carousel-tout-commence.png
      - name: Commit decoded image assets
        run: |
          git config user.name ChatGPT
          git config user.email chatgpt-actions@users.noreply.github.com
          git add assets/carousel-overthinking.png assets/carousel-amour-condition.png assets/carousel-tout-commence.png
          git diff --cached --quiet || (git commit -m "Decode carousel image assets" && git push)
