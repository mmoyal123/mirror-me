name: Patch homepage resources

on:
  push:
    branches: [main]
    paths:
      - 'ressources-section.html'
      - 'assets/cover-amour-condition.png'
      - 'assets/cover-overthinking.png'
      - '.github/workflows/patch-homepage-resources.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch homepage
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64

          def img(path):
              return 'data:image/png;base64,' + base64.b64encode(Path(path).read_bytes()).decode('ascii')

          block = Path('ressources-section.html').read_text(encoding='utf-8').strip() + '\n'
          block = block.replace('assets/cover-amour-condition.png', img('assets/cover-amour-condition.png'))
          block = block.replace('assets/cover-overthinking.png', img('assets/cover-overthinking.png'))
          block = block.replace('https://raw.githubusercontent.com/mmoyal123/mirror-me/main/assets/cover-amour-condition.png', img('assets/cover-amour-condition.png'))
          block = block.replace('https://raw.githubusercontent.com/mmoyal123/mirror-me/main/assets/cover-overthinking.png', img('assets/cover-overthinking.png'))

          index = Path('index.html')
          html = index.read_text(encoding='utf-8')
          marker = '<section class="section section-dark" id="guide">'
          end = html.find(marker)
          if end < 0:
              raise SystemExit('guide marker not found')
          start = html.find('<section class="section" id="ressources">')
          html = html[:start] + block + html[end:] if start != -1 and start < end else html[:end] + block + html[end:]
          index.write_text(html, encoding='utf-8')
          PY
      - name: Commit
        run: |
          git config user.name ChatGPT
          git config user.email chatgpt-actions@users.noreply.github.com
          git add index.html
          git diff --cached --quiet || (git commit -m "Embed Instagram carousel images on homepage" && git push)
